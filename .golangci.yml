version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - misspell
  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
