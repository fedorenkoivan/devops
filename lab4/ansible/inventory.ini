# Static inventory — fill in IPs after `terraform apply`
# Or generate automatically: terraform output -raw ansible_inventory > ansible/inventory.ini

[workers]
worker ansible_host=WORKER_IP

[db]
db ansible_host=DB_IP

[all:vars]
ansible_user=ansible
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
