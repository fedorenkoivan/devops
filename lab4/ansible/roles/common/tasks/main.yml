---
- name: Install common packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
    state: present
    update_cache: true

- name: Create teacher user
  ansible.builtin.user:
    name: teacher
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true
    password: "{{ teacher_password_hash }}"

- name: Create student user
  ansible.builtin.user:
    name: student
    shell: /bin/bash
    create_home: true

- name: Write gradebook
  ansible.builtin.copy:
    content: "{{ gradebook_n }}\n"
    dest: /home/student/gradebook
    owner: student
    group: student
    mode: "0644"
