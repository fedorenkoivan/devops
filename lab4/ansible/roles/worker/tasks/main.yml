---
- name: Install packages for worker
  ansible.builtin.apt:
    name:
      - nginx
      - golang-go
      - build-essential
    state: present
    update_cache: true

- name: Create app system user
  ansible.builtin.user:
    name: "{{ app_user }}"
    system: true
    home: "{{ app_home }}"
    create_home: true
    shell: /usr/sbin/nologin

- name: Create operator user
  ansible.builtin.user:
    name: operator
    shell: /bin/bash
    create_home: true
    password: "{{ operator_password_hash }}"

- name: Install operator sudoers rule
  ansible.builtin.copy:
    dest: /etc/sudoers.d/operator
    owner: root
    group: root
    mode: "0440"
    content: |
      Cmnd_Alias MYWEBAPP_CMDS = /bin/systemctl start mywebapp, /bin/systemctl stop mywebapp, /bin/systemctl restart mywebapp, /bin/systemctl status mywebapp
      Cmnd_Alias NGINX_CMDS = /bin/systemctl reload nginx
      operator ALL=(root) NOPASSWD: MYWEBAPP_CMDS, NGINX_CMDS
    validate: visudo -cf %s

- name: Create app directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"
  loop:
    - "{{ app_home }}"
    - "{{ app_config_dir }}"

- name: Clone application repository
  ansible.builtin.git:
    repo: https://github.com/fedorenkoivan/devops.git
    dest: /opt/mywebapp-src
    version: main
    force: true

- name: Build mywebapp binary
  ansible.builtin.command:
    cmd: go build -o /tmp/mywebapp ./cmd/mywebapp
    chdir: /opt/mywebapp-src
  environment:
    HOME: /root
    GOPATH: /root/go
  changed_when: true

- name: Install mywebapp binary
  ansible.builtin.copy:
    src: /tmp/mywebapp
    dest: "{{ app_bin }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart mywebapp

- name: Install migrations
  ansible.builtin.copy:
    src: /opt/mywebapp-src/migrations/
    dest: "{{ app_home }}/migrations/"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    remote_src: true

- name: Write app environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_config_dir }}/env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart mywebapp

- name: Install mywebapp systemd service
  ansible.builtin.template:
    src: mywebapp.service.j2
    dest: /etc/systemd/system/mywebapp.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Daemon reload
    - Restart mywebapp

- name: Enable and start mywebapp
  ansible.builtin.systemd:
    name: mywebapp
    enabled: true
    state: started

- name: Install nginx site config
  ansible.builtin.template:
    src: mywebapp.conf.j2
    dest: /etc/nginx/sites-available/mywebapp.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx

- name: Enable nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/mywebapp.conf
    dest: /etc/nginx/sites-enabled/mywebapp.conf
    state: link

- name: Remove nginx default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
